name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
  workflow_dispatch:

jobs:
  cpp:
    name: C++ tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DSEQTREE_TESTS=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  python:
    name: Python ${{ matrix.python }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: pip install -e ".[test]"
      - name: Install OLGA (optional, for realistic-sequence tests)
        continue-on-error: true
        run: pip install olga
      - name: Test
        run: pytest tests/python -q

  benchmarks:
    name: Benchmark tables + plots (oracle + perf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gnuplot
        run: sudo apt-get update && sudo apt-get install -y gnuplot
      - name: Install package (compiles seqtree from this repo state)
        run: pip install -e ".[test]"
      # Regenerate the deterministic table on the freshly compiled seqtree and assert
      # it matches the committed oracle (ints exact, metrics within 1e-9); a real change
      # means rerunning bench/tables/make_tables.sh and committing the new oracle. The
      # perf test checks build/search time + peak RSS stay within threshold of baseline.
      - name: Oracle + perf regression
        env:
          RUN_PERF: "1"
        run: pytest tests/python/test_oracle_tables.py tests/python/test_perf_regression.py -q -s
      # Smoke the full shell pipeline: tables produced by shell+python, plots by shell+python.
      - name: Tables and plots pipeline
        run: |
          bash bench/tables/make_tables.sh
          bash bench/plots/make_plots.sh

  appendix:
    name: Compile E-value appendix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: evalue.tex
          working_directory: appendix
          latexmk_use_lualatex: true
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: evalue-pdf
          path: appendix/evalue.pdf
