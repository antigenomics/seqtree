name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
  workflow_dispatch:

jobs:
  cpp:
    name: C++ tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DSEQTREE_TESTS=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  python:
    name: Python ${{ matrix.python }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: pip install -e ".[test]"
      - name: Install OLGA (optional, for realistic-sequence tests)
        continue-on-error: true
        run: pip install olga
      - name: Test
        run: pytest tests/python -q

  appendix:
    name: Compile E-value appendix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: evalue.tex
          working_directory: appendix
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: evalue-pdf
          path: appendix/evalue.pdf
