name: Release

# Build wheels + sdist and publish to PyPI when a GitHub Release is published
# (or on a v* tag). Publishing uses PyPI Trusted Publishing (OIDC) — configure the
# project's trusted publisher on PyPI to this repo + workflow; no API token needed.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_i686 *_i686 *-win32"
          CIBW_ARCHS_MACOS: "arm64 x86_64"
          CIBW_TEST_COMMAND: 'python -c "import seqtree; i=seqtree.Index.build([\"CASSLAPGATNEKLFF\"],alphabet=\"aa\"); assert len(i.search(\"CASSLAPGATNEKLFF\", seqtree.SearchParams()))==1"'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
